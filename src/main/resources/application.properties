spring.application.name=procurement-api

# Database — override in application-local.properties
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/procurement}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=create-drop

# JWT — override in application-local.properties
jwt.secret=${JWT_SECRET:changeme-generate-with-openssl-rand-hex-32}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
